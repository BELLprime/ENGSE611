<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
        body {
            font-family: "Prompt", sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
        }

        #header {
            color: darkblue;
        }

        .item {
            padding: 4px 0;
        }

        .highlight {
            background: yellow;
        }

        button {
            padding: 8px 16px;
            margin: 4px 4px 10px 0;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #00bfff;
            color: white;
            font-size: 14px;
        }

        button:hover {
            background: #0095d6;
        }

        #logBox {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #fff;
            border-left: 4px solid #00d26a;
            font-family: Consolas, monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1 id="header">หัวข้อเดิมบนหน้าเว็บ</h1>
    <p>รายการตัวอย่าง (class = "item"):</p>
    <ul>
        <li class="item">รายการที่ 1</li>
        <li class="item">รายการที่ 2</li>
        <li class="item">รายการที่ 3</li>
    </ul>

    <div style="margin-top: 20px; margin-bottom: 10px;">
        <button onclick="changeTitle()">เปลี่ยนข้อความ + สีของหัวข้อ</button>
        <button onclick="highlightItems()">ไฮไลต์ .item ทั้งหมด</button>
        <button onclick="addParagraph()">สร้าง & เพิ่มข้อความใหม่</button>
    </div>

    <div id="logBox">Log: รอกดปุ่มเพื่อดูการเปลี่ยนแปลง...</div>

    <script>
        // เลือก Element ตั้งแต่ต้น
        const title = document.getElementById("header");
        const items = document.querySelectorAll(".item");
        const logBox = document.getElementById("logBox");

        function log(message) {
            console.log(message);
            logBox.textContent += "\n" + message;
        }

        // เปลี่ยนข้อความ + สีของหัวข้อ
        function changeTitle() {
            title.textContent = "หัวข้อถูกเปลี่ยนโดย JavaScript";
            title.style.color = "red";
            title.style.fontWeight = "bold"; // แก้ไขจาก fontweight เป็น fontWeight
            log("เปลี่ยนข้อความและสีของ #header แล้ว");
        }

        // ไฮไลต์ element ที่มี class = "item"
        function highlightItems() {
            items.forEach((item, index) => {
                item.classList.add("highlight");
                item.textContent = "รายการที่ " + (index + 1) + " (ถูกไฮไลต์)";
            });
            log("เพิ่มคลาส .highlight ให้ .item ทั้งหมด");
        }

        // สร้าง <p> ใหม่แล้วปะท้าย body
        function addParagraph() {
            let p = document.createElement("p");  //--> สร้าง tag p เพิ่มใหม่ แต่ว่างเปล่า
            p.textContent = "ข้อความใหม่ที่เพิ่มจาก JavaScript เวลา: " + new Date().toLocaleTimeString(); //context ใหม่
            document.body.appendChild(p); // --> add P ลง ใน body 
            log("สร้าง <p> ใหม่และ appendChild ลงท้าย <body>");
        }
    </script>
</body>
</html>
