<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
</head>
<body>
    <p><b>กรอกคะแนน :</b></p>
    <input type="number" id="scoreInput" placeholder="0-100">
    <button onclick="runGrade()">คำนวณเกรด</button><br><br>
    <div id="outputBox">result...</div>
    
    <script>
        function calculateGrade(score) {
            if (score >= 80) return "A";
            else if (score >= 70) return "B";
            else if (score >= 60) return "C";
            else if (score >= 50) return "D";
            else return "F";
        }

        function runGrade() {
            console.clear(); 
            const output = [];
            
            let score = Number(document.getElementById("scoreInput").value);

            if (isNaN(score) || score < 0 || score > 100) {
                output.push("Please input between 0-100");
                document.getElementById("outputBox").textContent = output.join("\n");
                return;
            } 
            
            let grade = calculateGrade(score);

            output.push("score : " + score);
            output.push("grade : " + grade);

            console.log("score : ", score);
            console.log("grade : ", grade);

            document.getElementById("outputBox").textContent = output.join("\n");
        }
    </script>
</body>
</html>
